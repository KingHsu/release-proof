name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  offline-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pyright
        run: pyright
      - name: Tests
        env:
          RELEASE_PROOF_OFFLINE: "true"
        run: pytest --cov=release_proof --cov-report=term-missing
      - name: Compile
        run: python -m compileall -q src skills tests

