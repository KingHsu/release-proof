services:
  release-proof:
    build:
      context: .
    environment:
      RELEASE_PROOF_OFFLINE: "true"
      RELEASE_PROOF_DATA_DIR: /app/runtime
      RELEASE_PROOF_PROJECT_ROOT: /app
    ports:
      - "8002:8002"
    volumes:
      - ./runtime:/app/runtime
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
